services:
  - type: web
    name: milestone1-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set manually in Render dashboard (your API key)
      - key: M1_GROQ_API_KEY
        sync: false          # Alias — set to same value as GROQ_API_KEY
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL after frontend deploys
      - key: HF_HOME
        value: /tmp/hf_cache # Writable path for HuggingFace dataset cache on Render
      - key: TRANSFORMERS_CACHE
        value: /tmp/hf_cache
    healthCheckPath: /health
